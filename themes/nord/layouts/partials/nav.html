{{/* Mobile-only sticky nav — hidden at xl. Full width. */}}
{{ $isInner := not .IsHome }}
<div class="xl:hidden">
  <nav
    x-data="{ scrolled: false, isInner: {{ $isInner }} }"
    x-init="
      if (!isInner) {
        var avatar = document.getElementById('avatar-row');
        if (avatar) {
          new IntersectionObserver((entries) => {
            scrolled = !entries[0].isIntersecting;
          }, { threshold: 0, rootMargin: '-10px 0px 0px 0px' }).observe(avatar);
        }
      }
    "
    :class="(scrolled || isInner) ? 'bg-nord-bg2 border-nord-border' : 'bg-transparent border-transparent'"
    class="sticky top-0 z-50 w-full border-b transition-all duration-200 px-6 py-2.5 flex justify-between items-center"
  >
    <a href="/"
      :class="(scrolled || isInner) ? 'opacity-100 translate-y-0 pointer-events-auto' : 'opacity-0 -translate-y-2 pointer-events-none'"
      class="flex items-center gap-2.5 transition-all duration-200 no-underline"
    >
      <img src="/images/avatar.svg"
           class="w-[30px] h-[30px] rounded-full object-cover border border-nord-accent/80 flex-none"
           style="object-position:50% 12%"
           alt="{{ .Site.Params.author }}">
      <span class="font-mono text-sm text-nord-bright">{{ .Site.Params.author }}</span>
    </a>
    <div class="flex gap-5 ml-auto">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL }}"
         class="nav-link {{ if or (eq $.RelPermalink .URL) (and (hasPrefix $.RelPermalink .URL) (ne .URL "/")) }}active{{ end }}">
        {{ .Name }}
      </a>
      {{ end }}
    </div>
  </nav>
</div>
